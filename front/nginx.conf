server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location /static/ {
        alias /usr/share/nginx/html/static/;
    }

    # Тимчасово закоментуйте проксі
    # location /api/ {
    #     proxy_pass http://api:8000/;
    # }

    location / {
        try_files $uri $uri/ /index.html;
    }
}